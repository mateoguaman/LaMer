# Azure recipe: 2 training VMs × 2 H100s each = 4 total training GPUs.
# Extends the shared language_table_base recipe.
#
# Usage (from vm-train-0, inside start_training.sh):
#   python3 -m verl.trainer.main_ppo \
#       --config-name recipes/language_table_azure_2x2 \
#       env.remote_address=<env-vm-ip>:50051 \
#       env.remote_val_address=<env-vm-ip>:50052 \
#       data.train_files=<path>/train.parquet \
#       data.val_files=<path>/test.parquet \
#       trainer.experiment_name=<run_name> \
#       trainer.default_local_dir=<checkpoint_dir>

defaults:
  - recipes/language_table_base
  - _self_

trainer:
  n_gpus_per_node: 2   # Azure VMs max out at 2 GPUs
  nnodes: 2            # vm-train-0 (head) + vm-train-1 (worker)
